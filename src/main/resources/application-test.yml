spring:
  config:
    activate:
      on-profile: test
  
  datasource:
    url: jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    username: sa
    password: 
    driver-class-name: org.h2.Driver
    hikari:
      maximum-pool-size: 5
      minimum-idle: 1
      connection-timeout: 10000
      idle-timeout: 300000
      max-lifetime: 900000
      pool-name: BRS-HikariCP-Test
  
  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect
        format_sql: false
        jdbc:
          batch_size: 10
        order_inserts: true
        order_updates: true
        connection:
          provider_disables_autocommit: true
        cache:
          use_second_level_cache: false
          use_query_cache: false
  
  flyway:
    enabled: false
  
  cache:
    type: caffeine
    caffeine:
      spec: maximumSize=100,expireAfterWrite=10m,expireAfterAccess=5m
  
  security:
    jwt:
      access-token:
        expiration: 1h
        secret: test-access-secret-key-for-testing-only
      refresh-token:
        expiration: 7d
        secret: test-refresh-secret-key-for-testing-only
      issuer: book-review-system-test
      audience: book-review-users-test
  
  jackson:
    default-property-inclusion: non_null
    serialization:
      write-dates-as-timestamps: false
    deserialization:
      fail-on-unknown-properties: false

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
      base-path: /actuator
  endpoint:
    health:
      show-details: always
      show-components: always
  metrics:
    export:
      prometheus:
        enabled: false

logging:
  level:
    com.talentica.brs: DEBUG
    org.springframework.security: DEBUG
    org.hibernate.SQL: DEBUG
    org.hibernate.type.descriptor.sql.BasicBinder: TRACE
    org.flywaydb: DEBUG
    root: INFO
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n"
    file: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n"
  file:
    name: logs/book-review-service-test.log
    max-size: 10MB
    max-history: 5

server:
  port: 0
  servlet:
    context-path: /api/v1
  compression:
    enabled: false

rate-limit:
  reviews:
    max-requests: 100
    time-window: 24h
  auth:
    max-requests: 50
    time-window: 15m

# Test-specific settings
app:
  security:
    cors:
      allowed-origins: "*"
      allowed-methods: "*"
      allowed-headers: "*"
      allow-credentials: false
  monitoring:
    enabled: true
    metrics-collection: true
    health-check-interval: 60s
